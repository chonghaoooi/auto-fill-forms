<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI Form Autofill</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <header class="hero">
        <div>
          <p class="eyebrow">Local AI assistant</p>
          <h1>Form Autofill</h1>
        </div>
        <span class="status-pill">Private</span>
      </header>
      <form id="profile-form" novalidate>
        <section class="panel">
          <div>
            <div class="section-title">Your details</div>
            <p class="help-text">These are filled automatically when a form asks for them.</p>
          </div>
          <label>
            Full name
            <input id="name" name="name" autocomplete="name" placeholder="Tan Wei Ming">
          </label>
          <label>
            Admin or student ID
            <input id="adminNumber" name="adminNumber" placeholder="Any length or format">
          </label>
          <label>
            Class
            <input id="class" name="class" placeholder="ETC.DIT/FT/2A/05">
          </label>
        </section>
        <section class="panel">
          <div>
            <div class="section-title">Email choices</div>
            <p class="help-text">Pick one default. You can switch emails directly on a form.</p>
          </div>
          <div id="emails"></div>
          <button id="add-email" type="button">Add email</button>
        </section>
        <section class="panel">
          <div>
            <div class="section-title">Local AI model</div>
            <p class="help-text">Runs on your computer through Ollama. No form text is sent to a cloud service.</p>
          </div>
          <label>
            Ollama address
            <input id="localModelBaseUrl" name="localModelBaseUrl" placeholder="http://localhost:11434">
          </label>
          <label>
            Model name
            <input id="modelName" name="modelName" placeholder="qwen2.5:0.5b">
          </label>
        </section>
        <p id="errors" role="alert"></p>
        <button class="save-button" type="submit">Save profile</button>
        <p id="status" role="status"></p>
      </form>
    </main>
    <script src="../dist/defaults.js"></script>
    <script src="../dist/popup.js"></script>
  </body>
</html>
