<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Form Autofill</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <header class="hero">
        <div>
          <p class="eyebrow">Local form helper</p>
          <h1>Form Autofill</h1>
        </div>
        <img class="brand-icon" src="../assets/icon-48.png" alt="">
      </header>
      <form id="profile-form" novalidate>
        <section class="panel switch-panel">
          <div>
            <div class="section-title">Autofill</div>
            <p class="help-text">Turn this off when you do not want the extension to fill forms.</p>
          </div>
          <label class="switch">
            <input id="enabled" name="enabled" type="checkbox">
            <span class="slider" aria-hidden="true"></span>
            <span id="enabledText">On</span>
          </label>
        </section>
        <section class="panel">
          <div>
            <div class="section-title">Your details</div>
            <p class="help-text">These are filled automatically when a form asks for them.</p>
          </div>
          <label>
            Full name
            <input id="name" name="name" autocomplete="name" placeholder="Tan Wei Ming">
          </label>
          <label>
            Admin or student ID
            <input id="adminNumber" name="adminNumber" placeholder="Any length or format">
          </label>
          <label>
            Phone number
            <input id="phoneNumber" name="phoneNumber" autocomplete="tel" placeholder="9123 4567">
          </label>
          <label>
            Class
            <input id="class" name="class" placeholder="ETC.DIT/FT/2A/05">
          </label>
        </section>
        <section class="panel">
          <div>
            <div class="section-title">Email choices</div>
            <p class="help-text">Pick one default. You can switch emails directly on a form.</p>
          </div>
          <div id="emails"></div>
          <button id="add-email" type="button">Add email</button>
        </section>
        <p id="errors" role="alert"></p>
        <button class="save-button" type="submit">Save profile</button>
        <p id="status" role="status"></p>
      </form>
    </main>
    <script src="../dist/defaults.js"></script>
    <script src="../dist/popup.js"></script>
  </body>
</html>
