<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI Form Autofill</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <h1>AI Form Autofill</h1>
      <form id="profile-form" novalidate>
        <label>
          Name
          <input id="name" name="name" autocomplete="name">
        </label>
        <label>
          Date
          <input id="date" name="date" type="date">
        </label>
        <label>
          Admin number
          <input id="adminNumber" name="adminNumber" inputmode="numeric" pattern="\d{6}" placeholder="123456">
        </label>
        <label>
          Class
          <input id="class" name="class" placeholder="ETC.DIT/FT/2A/05">
        </label>
        <section>
          <div class="section-title">Emails</div>
          <div id="emails"></div>
          <button id="add-email" type="button">Add email</button>
        </section>
        <section>
          <div class="section-title">Local model</div>
          <label>
            Base URL
            <input id="localModelBaseUrl" name="localModelBaseUrl" placeholder="http://localhost:11434">
          </label>
          <label>
            Model name
            <input id="modelName" name="modelName" placeholder="qwen2.5:0.5b">
          </label>
          <div class="thresholds">
            <label>
              Autofill
              <input id="autofillThreshold" name="autofillThreshold" type="number" min="0" max="1" step="0.05">
            </label>
            <label>
              Suggest
              <input id="suggestThreshold" name="suggestThreshold" type="number" min="0" max="1" step="0.05">
            </label>
          </div>
        </section>
        <p id="errors" role="alert"></p>
        <button type="submit">Save</button>
        <p id="status" role="status"></p>
      </form>
    </main>
    <script src="../dist/defaults.js"></script>
    <script src="../dist/popup.js"></script>
  </body>
</html>
